supergraph:
  listen: 0.0.0.0:4000
  introspection: true

sandbox:
  enabled: true

homepage:
  enabled: false

cors:
  policies:
    - origins:
        - http://localhost:3000
        - http://localhost:3001
        - http://localhost:3002
        - http://localhost:3003
  allow_credentials: true

headers:
  all:
    request:
      - propagate:
          named: Authorization
